apiVersion: v1.wannabe.dev/v1
kind: AdaptiveWorkflow
metadata:
  name: fanout-workflow
spec:
  optimizationGoal: MinimizeTime
  maxResources:
    cpu: "2"
    memory: "1Gi"
  tasks:
    - name: setup
      image: alpine:latest
      command: ["echo", "Initializing root setup..."]
      
    - name: parallel-branch-a
      image: alpine:latest
      command: ["sleep", "5"]
      dependencies: ["setup"]
      
    - name: parallel-branch-b
      image: alpine:latest
      command: ["sleep", "5"]
      dependencies: ["setup"]
      
    - name: parallel-branch-c
      image: alpine:latest
      command: ["sleep", "5"]
      dependencies: ["setup"]
