---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - v1.wannabe.dev
  resources:
  - adaptiveworkflows
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - v1.wannabe.dev
  resources:
  - adaptiveworkflows/finalizers
  verbs:
  - update
- apiGroups:
  - v1.wannabe.dev
  resources:
  - adaptiveworkflows/status
  verbs:
  - get
  - patch
  - update
