apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-engine
  namespace: system
  labels:
    app: inference-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-engine
  template:
    metadata:
      labels:
        app: inference-engine
    spec:
      containers:
      - name: engine
        image: inference-engine:latest
        ports:
        - containerPort: 50051
        env:
        - name: GRPC_PORT
          value: "50051"
        - name: DB_CONNECTION_STR
          value: "postgres://postgres:postgres@statedb.system.svc.cluster.local:5432/adaptiveworkflows?sslmode=disable"
        # The model is baked into the image
---
apiVersion: v1
kind: Service
metadata:
  name: inference-engine
  namespace: system
spec:
  selector:
    app: inference-engine
  ports:
  - port: 50051
    targetPort: 50051
