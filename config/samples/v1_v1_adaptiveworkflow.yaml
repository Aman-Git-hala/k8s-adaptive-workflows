apiVersion: v1.wannabe.dev/v1
kind: AdaptiveWorkflow
metadata:
  name: etl-pipeline
  labels:
    app.kubernetes.io/name: k8s-adaptive-workflows
    app.kubernetes.io/managed-by: kustomize
spec:
  optimizationGoal: MinimizeTime
  maxResources:
    cpu: "2"
    memory: "1Gi"
  tasks:
    # Stage 1: Extract (no dependencies — root task)
    - name: extract-users
      image: python:3.12-slim
      command: ["python", "-c", "print('Extracting user data from source DB...')"]
      baseResources:
        requests:
          cpu: 200m
          memory: 128Mi

    - name: extract-orders
      image: python:3.12-slim
      command: ["python", "-c", "print('Extracting order data from source DB...')"]
      baseResources:
        requests:
          cpu: 200m
          memory: 128Mi

    # Stage 2: Transform (depends on extracts)
    - name: transform-users
      image: python:3.12-slim
      command: ["python", "-c", "print('Transforming user records...')"]
      dependencies: ["extract-users"]
      baseResources:
        requests:
          cpu: 300m
          memory: 256Mi

    - name: transform-orders
      image: python:3.12-slim
      command: ["python", "-c", "print('Transforming order records...')"]
      dependencies: ["extract-orders"]
      baseResources:
        requests:
          cpu: 300m
          memory: 256Mi

    # Stage 3: Join (depends on both transforms)
    - name: join-data
      image: python:3.12-slim
      command: ["python", "-c", "print('Joining user and order data...')"]
      dependencies: ["transform-users", "transform-orders"]
      baseResources:
        requests:
          cpu: 500m
          memory: 512Mi

    # Stage 4: Load (depends on join)
    - name: load-warehouse
      image: python:3.12-slim
      command: ["python", "-c", "print('Loading to data warehouse...')"]
      dependencies: ["join-data"]
      baseResources:
        requests:
          cpu: 200m
          memory: 128Mi

    # Stage 5: Notify (depends on load)
    - name: send-notification
      image: alpine:latest
      command: ["echo", "ETL pipeline completed successfully!"]
      dependencies: ["load-warehouse"]
