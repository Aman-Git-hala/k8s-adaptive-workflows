apiVersion: v1.wannabe.dev/v1
kind: AdaptiveWorkflow
metadata:
  name: massive-52-task-dag
  namespace: default
spec:
  optimizationGoal: MinimizeTime
  maxResources:
    cpu: "1"
    memory: "1Gi"
  tasks:
    - name: genesis-node
      image: busybox
      command:
        - "sh"
        - "-c"
        - "echo \"Genesis node starting...\" && sleep 1"
    - name: ingest-flakey-0
      image: busybox
      command:
        - "sh"
        - "-c"
        - |
          attempts=0
          while [ $attempts -lt 5 ]; do
            if [ $((RANDOM % 5)) -eq 0 ]; then
              echo "Ingest succeeded on attempt $((attempts+1))!"
              exit 0
            fi
            echo "Ingest failed attempt $((attempts+1)), retrying in 1s..."
            sleep 1
            attempts=$((attempts+1))
          done
          echo "All 5 retries exhausted, forcing success to avoid failing the whole DAG."
          exit 0
      dependencies:
        - genesis-node
      baseResources:
        requests:
          cpu: 20m
          memory: 32Mi
