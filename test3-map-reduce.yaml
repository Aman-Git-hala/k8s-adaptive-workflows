apiVersion: v1.wannabe.dev/v1
kind: AdaptiveWorkflow
metadata:
  name: map-reduce-workflow
spec:
  optimizationGoal: MinimizeTime
  maxResources:
    cpu: "3"
    memory: "2Gi"
  tasks:
    - name: map-data
      image: python:3.12-slim
      command: ["python", "-c", "print('Mapping chunks...')"]
      
    - name: process-chunk-1
      image: python:3.12-slim
      command: ["python", "-c", "import time; time.sleep(2); print('Chunk 1 done')"]
      dependencies: ["map-data"]
      
    - name: process-chunk-2
      image: python:3.12-slim
      command: ["python", "-c", "import time; time.sleep(4); print('Chunk 2 done')"]
      dependencies: ["map-data"]
      
    - name: process-chunk-3
      image: python:3.12-slim
      command: ["python", "-c", "import time; time.sleep(3); print('Chunk 3 done')"]
      dependencies: ["map-data"]
      
    - name: reduce-results
      image: python:3.12-slim
      command: ["python", "-c", "print('Aggregating all chunk results!')"]
      dependencies: ["process-chunk-1", "process-chunk-2", "process-chunk-3"]
